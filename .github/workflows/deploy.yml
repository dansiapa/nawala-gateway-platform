name: Deploy Nawala to Production

on:
  push:
    branches:
      - deploy/production
  workflow_dispatch:

env:
  APP_NAME: nawala
  DEPLOY_PATH: /opt/nawala
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-jar
          path: platform/target/nawala-platform-*.jar
          if-no-files-found: error
          retention-days: 1

      - name: Upload gateway artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway/target/nawala-gateway-*.jar
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download platform artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-jar
          path: ./artifacts/platform

      - name: Download gateway artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar
          path: ./artifacts/gateway

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy artifacts to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no \
            ./artifacts/platform/nawala-platform-*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/platform.jar

          sshpass -e scp -o StrictHostKeyChecking=no \
            ./artifacts/gateway/nawala-gateway-*.jar \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/gateway.jar

      - name: Copy deployment scripts
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no \
            ./scripts/server-setup.sh \
            ./scripts/start.sh \
            ./scripts/stop.sh \
            ./scripts/restart.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Execute deployment
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          
          cd /opt/nawala
          chmod +x *.sh

          # Stop existing services
          ./stop.sh || true

          # Run server setup (idempotent)
          sudo ./server-setup.sh

          # Start services
          ./start.sh

          echo "=== Deployment complete ==="
          echo "Platform: http://$(hostname -I | awk '{print $1}'):8080"
          echo "Gateway:  http://$(hostname -I | awk '{print $1}'):9090"
          EOF

      - name: Health check
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sleep 30
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          
          echo "--- Platform Health ---"
          curl -sf http://localhost:8080/login && echo " [OK]" || echo " [FAIL]"
          
          echo "--- Gateway Health ---"
          curl -sf http://localhost:9090/actuator/health && echo " [OK]" || echo " [FAIL]"
          EOF
