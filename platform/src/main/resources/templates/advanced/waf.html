<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAF - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar('waf')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Web Application Firewall', 'Custom security rules for request filtering')}"></div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card"><div class="card-header"><h3>Create WAF Rule</h3></div><div class="card-body">
                <form method="post" action="/waf/rules" class="form-grid">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required class="form-control" placeholder="Rule name"></div>
                    <div class="form-group"><label>Type</label><select name="ruleType" class="form-control"><option value="CUSTOM">Custom</option><option value="SQL_INJECTION">SQL Injection</option><option value="XSS">XSS</option><option value="PATH_TRAVERSAL">Path Traversal</option></select></div>
                    <div class="form-group"><label>Pattern (Regex)</label><input type="text" name="pattern" required class="form-control" placeholder="Regex pattern"></div>
                    <div class="form-group"><label>Action</label><select name="action" class="form-control"><option value="BLOCK">Block</option><option value="LOG">Log Only</option></select></div>
                    <div class="form-group"><label>Target</label><select name="targetField" class="form-control"><option value="ALL">All</option><option value="HEADER">Headers</option><option value="BODY">Body</option><option value="QUERY_PARAM">Query Params</option><option value="PATH">Path</option></select></div>
                    <div class="form-group"><label>Priority</label><input type="number" name="priority" value="100" class="form-control"></div>
                    <div class="form-group"><label>Description</label><input type="text" name="description" class="form-control" placeholder="Optional description"></div>
                    <input type="hidden" name="routeId" value="">
                    <div class="form-actions"><button type="submit" class="btn btn-primary">Create Rule</button></div>
                </form>
            </div></div>
            <div class="card" style="margin-top:1.5rem"><div class="card-header"><h3>Active Rules</h3></div><div class="card-body">
                <table class="data-table" th:if="${!rules.isEmpty()}"><thead><tr><th>Name</th><th>Type</th><th>Action</th><th>Target</th><th>Matches</th><th>Actions</th></tr></thead><tbody>
                    <tr th:each="rule : ${rules}">
                        <td th:text="${rule.name}">name</td>
                        <td><span class="badge badge-blue" th:text="${rule.ruleType}">type</span></td>
                        <td><span class="badge" th:classappend="${rule.action == 'BLOCK'} ? ' badge-red' : ' badge-orange'" th:text="${rule.action}">action</span></td>
                        <td th:text="${rule.targetField}">ALL</td>
                        <td th:text="${rule.matchCount}">0</td>
                        <td><form method="post" th:action="@{/waf/rules/{id}/delete(id=${rule.id})}" style="display:inline"><button class="btn btn-sm btn-danger">Delete</button></form></td>
                    </tr>
                </tbody></table>
                <div class="empty-state" th:if="${rules.isEmpty()}"><p>No custom WAF rules. Built-in protection is always active.</p></div>
            </div></div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
