<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Nawala</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-brand"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#grad1)"/><path d="M12 16h24M12 24h18M12 32h22" stroke="white" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs></svg><span>Nawala</span></div></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Dashboard</span></a>
            <a href="/routes" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg><span>API Routes</span></a>
            <a href="/api-keys" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg><span>API Keys</span></a>
            <a href="/threats" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Threats</span></a>
            <a href="/health" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>Health Monitor</span></a>
            <a href="/profile" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info"><div class="avatar" th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : '?'}">J</div><div class="user-details"><span class="user-name" th:text="${user.fullName}">User</span><span class="user-role" th:text="${user.role}">USER</span></div></div>
            <form th:action="@{/logout}" method="post"><button type="submit" class="btn-icon" title="Sign out"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button></form>
        </div>
    </aside>
    <main class="main-content">
        <header class="top-bar">
            <button class="mobile-menu-btn" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
            <div class="page-title"><h1>Profile Settings</h1><p>Manage your account information</p></div>
        </header>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success" role="alert"><span th:text="${success}"></span></div>
            <div class="profile-grid">
                <div class="card">
                    <div class="card-header"><h3>Personal Information</h3></div>
                    <div class="card-body">
                        <form th:action="@{/profile}" th:object="${form}" method="post" class="profile-form">
                            <div class="input-group">
                                <label for="fullName">Full Name</label>
                                <div class="input-wrapper" th:classappend="${#fields.hasErrors('fullName')} ? 'has-error' : ''">
                                    <input type="text" id="fullName" th:field="*{fullName}" required>
                                </div>
                                <span class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                            </div>
                            <div class="input-group">
                                <label for="email">Email Address</label>
                                <div class="input-wrapper" th:classappend="${#fields.hasErrors('email')} ? 'has-error' : ''">
                                    <input type="email" id="email" th:field="*{email}" required>
                                </div>
                                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                            </div>
                            <hr class="divider">
                            <h4 style="margin-bottom: 1rem; color: var(--text-primary)">Change Password</h4>
                            <p style="margin-bottom: 1rem; font-size: 0.875rem; color: var(--text-secondary)">Leave blank to keep current password</p>
                            <div class="input-group">
                                <label for="currentPassword">Current Password</label>
                                <div class="input-wrapper" th:classappend="${#fields.hasErrors('currentPassword')} ? 'has-error' : ''">
                                    <input type="password" id="currentPassword" th:field="*{currentPassword}">
                                </div>
                                <span class="field-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></span>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label for="newPassword">New Password</label>
                                    <div class="input-wrapper" th:classappend="${#fields.hasErrors('newPassword')} ? 'has-error' : ''">
                                        <input type="password" id="newPassword" th:field="*{newPassword}">
                                    </div>
                                    <span class="field-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
                                </div>
                                <div class="input-group">
                                    <label for="confirmNewPassword">Confirm</label>
                                    <div class="input-wrapper" th:classappend="${#fields.hasErrors('confirmNewPassword')} ? 'has-error' : ''">
                                        <input type="password" id="confirmNewPassword" th:field="*{confirmNewPassword}">
                                    </div>
                                    <span class="field-error" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></span>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="margin-top: 1rem"><span>Save Changes</span></button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>Account Details</h3></div>
                    <div class="card-body">
                        <div class="profile-avatar-section">
                            <div class="avatar avatar-large" th:text="${user.fullName != null ? user.fullName.substring(0,1).toUpperCase() : '?'}">J</div>
                            <h3 th:text="${user.fullName}">User</h3>
                            <span class="badge" th:text="${user.role}" th:classappend="${user.role.name() == 'ADMIN'} ? ' badge-purple' : ' badge-blue'">USER</span>
                        </div>
                        <div class="info-list" style="margin-top: 1.5rem">
                            <div class="info-item"><span class="info-label">Username</span><span class="info-value" th:text="${user.username}">user</span></div>
                            <div class="info-item"><span class="info-label">Member Since</span><span class="info-value" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd MMMM yyyy') : 'N/A'}">01 Jan 2024</span></div>
                            <div class="info-item"><span class="info-label">Last Login</span><span class="info-value" th:text="${user.lastLoginAt != null ? #temporals.format(user.lastLoginAt, 'dd MMM yyyy HH:mm') : 'First session'}">Never</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
