<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Detection - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar('threats')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Threat Detection', 'Anomaly Guard - Real-time threat monitoring')}"></div>
        <div class="content-area">
            <div class="stats-row">
                <div class="stat-card" th:classappend="${stats.unresolvedCount() > 0} ? ' stat-card-warning' : ''"><div class="stat-icon stat-icon-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div><div class="stat-content"><span class="stat-value" th:text="${stats.unresolvedCount()}">0</span><span class="stat-label">Unresolved</span></div></div>
                <div class="stat-card" th:classappend="${stats.criticalCount() > 0} ? ' stat-card-danger' : ''"><div class="stat-icon stat-icon-red"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><div class="stat-content"><span class="stat-value" th:text="${stats.criticalCount()}">0</span><span class="stat-label">Critical</span></div></div>
                <div class="stat-card"><div class="stat-icon stat-icon-purple"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div><div class="stat-content"><span class="stat-value" th:text="${stats.blockedCount()}">0</span><span class="stat-label">Auto-Blocked</span></div></div>
                <div class="stat-card"><div class="stat-icon stat-icon-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-content"><span class="stat-value" th:text="${stats.last24hCount()}">0</span><span class="stat-label">Last 24h</span></div></div>
            </div>
            <div class="card" style="margin-top:1.5rem">
                <div class="card-header"><h3>Recent Anomaly Events</h3></div>
                <div class="card-body">
                    <table class="data-table" th:if="${!events.isEmpty()}">
                        <thead><tr><th>Type</th><th>Severity</th><th>Source</th><th>Path</th><th>Count</th><th>Status</th><th>Detected</th><th>Action</th></tr></thead>
                        <tbody>
                            <tr th:each="e : ${events}">
                                <td><span class="badge" th:text="${e.type}">T</span></td>
                                <td><span class="badge" th:classappend="${e.severity == 'HIGH' or e.severity == 'CRITICAL'} ? ' badge-red' : ' badge-orange'" th:text="${e.severity}">S</span></td>
                                <td th:text="${e.sourceIp}">IP</td>
                                <td th:text="${e.targetPath}">Path</td>
                                <td th:text="${e.requestCount}">0</td>
                                <td><span class="badge badge-green" th:if="${e.resolved}">Resolved</span><span class="badge badge-red" th:if="${!e.resolved and e.autoBlocked}">Blocked</span><span class="badge badge-orange" th:if="${!e.resolved and !e.autoBlocked}">Active</span></td>
                                <td th:text="${#temporals.format(e.detectedAt,'dd MMM HH:mm')}">Time</td>
                                <td><form th:if="${!e.resolved}" th:action="@{'/threats/'+${e.id}+'/resolve'}" method="post" style="display:inline"><button type="submit" class="btn btn-sm btn-secondary">Resolve</button></form></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="empty-state" th:if="${events.isEmpty()}"><p>No threats detected. System is secure.</p></div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
