<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${doc.title} + '' - Nawala API Docs''">Doc View</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <main class="main-content" style="margin-left:0">
        <header class="top-bar"><div class="page-title"><h1 th:text="${doc.title}">API Title</h1><p><span class="badge badge-blue" th:text="''v'' + ${doc.version}">v1.0.0</span> <span th:text="${doc.description}">desc</span></p></div><div><a href="/docs" class="btn btn-secondary">Back</a></div></header>
        <div class="content-area">
            <div class="card"><div class="card-header"><h3>OpenAPI Specification</h3></div><div class="card-body">
                <pre style="background:#1e1e2e;color:#cdd6f4;padding:1.5rem;border-radius:8px;overflow-x:auto;font-size:0.85rem;line-height:1.6" th:text="${doc.openApiSpec}">spec</pre>
            </div></div>
        </div>
    </main>
</body>
</html>
