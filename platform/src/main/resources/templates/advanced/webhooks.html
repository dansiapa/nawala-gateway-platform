<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhooks - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar(''webhooks'')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header(''Webhooks'', ''Event-driven notifications to your services'')}"></div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card"><div class="card-header"><h3>Create Webhook</h3></div><div class="card-body">
                <form method="post" action="/webhooks" class="form-grid">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required class="form-control" placeholder="My Slack Alert"></div>
                    <div class="form-group"><label>Target URL</label><input type="url" name="targetUrl" required class="form-control" placeholder="https://hooks.slack.com/..."></div>
                    <div class="form-group"><label>Event Type</label><select name="eventType" class="form-control"><option value="ROUTE_DOWN">Route Down</option><option value="ANOMALY_DETECTED">Anomaly Detected</option><option value="KEY_EXPIRED">Key Expired</option><option value="QUOTA_REACHED">Quota Reached</option><option value="CIRCUIT_OPEN">Circuit Open</option></select></div>
                    <div class="form-group"><label>HMAC Secret (optional)</label><input type="text" name="secret" class="form-control" placeholder="Signing secret"></div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">Create Webhook</button></div>
                </form>
            </div></div>
            <div class="card" style="margin-top:1.5rem"><div class="card-header"><h3>Your Webhooks</h3></div><div class="card-body">
                <table class="data-table" th:if="${!webhooks.isEmpty()}"><thead><tr><th>Name</th><th>URL</th><th>Event</th><th>Status</th><th>Last Triggered</th><th>Actions</th></tr></thead><tbody>
                    <tr th:each="wh : ${webhooks}">
                        <td th:text="${wh.name}">name</td>
                        <td><code th:text="${#strings.abbreviate(wh.targetUrl, 40)}">url</code></td>
                        <td><span class="badge badge-blue" th:text="${wh.eventType}">event</span></td>
                        <td><span class="badge" th:classappend="${wh.active} ? '' badge-green'' : '' badge-grey''" th:text="${wh.active} ? ''Active'' : ''Inactive''">status</span></td>
                        <td th:text="${wh.lastTriggeredAt != null} ? ${#temporals.format(wh.lastTriggeredAt, ''yyyy-MM-dd HH:mm'')} : ''Never''">never</td>
                        <td><form method="post" th:action="@{/webhooks/{id}/delete(id=${wh.id})}" style="display:inline"><button class="btn btn-sm btn-danger">Delete</button></form></td>
                    </tr>
                </tbody></table>
                <div class="empty-state" th:if="${webhooks.isEmpty()}"><p>No webhooks configured yet.</p></div>
            </div></div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
