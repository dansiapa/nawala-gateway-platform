<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log - Nawala Admin</title>
    
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-brand"><img th:src="@{/img/logo.svg}" alt="Nawala" width="32" height="32"/><span>Nawala</span></div></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><span>Dashboard</span></a>
            <a href="/admin" class="nav-item"><span>Admin Panel</span></a>
            <a href="/admin/users" class="nav-item"><span>Users</span></a>
            <a href="/admin/tiers" class="nav-item"><span>Rate Tiers</span></a>
            <a href="/admin/audit" class="nav-item active"><span>Audit Log</span></a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-bar"><div class="page-title"><h1>Audit Log</h1><p>Complete activity trail for compliance and security</p></div></header>
        <div class="content-area">
            <div class="card"><div class="card-body" style="padding:0">
                <table class="data-table"><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Resource</th><th>Details</th><th>IP</th></tr></thead><tbody>
                    <tr th:each="a : ${logs}">
                        <td th:text="${a.createdAt != null ? #temporals.format(a.createdAt, ''yyyy-MM-dd HH:mm:ss'') : ''''}">time</td>
                        <td th:text="${a.username}">user</td>
                        <td><span class="badge badge-blue" th:text="${a.action}">action</span></td>
                        <td th:text="${a.resourceType != null ? a.resourceType + '' #'' + a.resourceId : ''-''}">resource</td>
                        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis" th:text="${a.details}">details</td>
                        <td th:text="${a.ipAddress}">ip</td>
                    </tr>
                    <tr th:if="${logs.isEmpty()}"><td colspan="6" class="empty-state"><p>No audit entries yet</p></td></tr>
                </tbody></table>
            </div></div>
        </div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
