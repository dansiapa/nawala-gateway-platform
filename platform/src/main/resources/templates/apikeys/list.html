<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Keys - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar('apikeys')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header('API Keys', 'Generate, rotate, and scope authentication keys')}"></div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
            <div th:if="${rawKey}" class="alert alert-warning" style="flex-direction:column;align-items:flex-start">
                <strong>Your new API Key (shown only once):</strong>
                <code class="mono" style="margin-top:0.5rem;word-break:break-all;font-size:0.85rem" th:text="${rawKey}"></code>
                <small style="margin-top:0.5rem;opacity:0.8">Copy this key now. It will not be shown again.</small>
            </div>
            <div class="card" style="margin-bottom:1.5rem">
                <div class="card-header"><h3>Generate New Key</h3></div>
                <div class="card-body">
                    <form th:action="@{/api-keys/generate}" method="post" class="form-grid">
                        <div class="form-group"><label>Key Name</label><input type="text" name="name" required class="form-control" placeholder="e.g. Production Backend"></div>
                        <div class="form-group"><label>Expires in (days)</label><input type="number" name="expirationDays" class="form-control" placeholder="Blank = no expiry"></div>
                        <div class="form-group"><label>Daily Quota (0=unlimited)</label><input type="number" name="dailyQuota" value="0" class="form-control" min="0"></div>
                        <div class="form-group"><label>Monthly Quota (0=unlimited)</label><input type="number" name="monthlyQuota" value="0" class="form-control" min="0"></div>
                        <div class="form-group"><label>Allowed IPs (comma-separated)</label><input type="text" name="allowedIps" class="form-control" placeholder="All IPs allowed if blank"></div>
                        <div class="form-group"><label>Allowed Routes (comma-separated IDs)</label><input type="text" name="allowedRoutes" class="form-control" placeholder="All routes if blank"></div>
                        <div class="form-group"><label>Allowed Methods</label><input type="text" name="allowedMethods" class="form-control" placeholder="GET,POST,PUT,DELETE (blank=all)"></div>
                        <div class="form-actions"><button type="submit" class="btn btn-primary">Generate Key</button></div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Your Keys</h3></div>
                <div class="card-body" style="padding:0">
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Prefix</th><th>Status</th><th>Requests</th><th>Quota</th><th>Last Used</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr th:each="key : ${keys}">
                                <td th:text="${key.name}">Key</td>
                                <td class="mono" th:text="${key.prefix} + '...'">nwl_abc...</td>
                                <td><span class="badge" th:classappend="${key.active and !key.expired} ? ' badge-green' : ' badge-red'" th:text="${!key.active} ? 'Revoked' : (${key.expired} ? 'Expired' : 'Active')">Active</span></td>
                                <td th:text="${key.requestCount}">0</td>
                                <td><span th:if="${key.dailyQuota > 0}" th:text="${key.dailyUsage} + '/' + ${key.dailyQuota} + '/day'">0/1000/day</span><span th:if="${key.dailyQuota == 0}">Unlimited</span></td>
                                <td th:text="${key.lastUsedAt != null ? #temporals.format(key.lastUsedAt, 'dd MMM yy HH:mm') : 'Never'}">Never</td>
                                <td>
                                    <form th:if="${key.active}" th:action="@{'/api-keys/' + ${key.id} + '/rotate'}" method="post" style="display:inline"><button type="submit" class="btn btn-sm btn-secondary" onclick="return confirm('Rotate? Old key valid 24h.')">Rotate</button></form>
                                    <form th:if="${key.active}" th:action="@{'/api-keys/' + ${key.id} + '/revoke'}" method="post" style="display:inline"><button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Revoke this key?')">Revoke</button></form>
                                    <span th:unless="${key.active}" class="text-muted">-</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(keys)}"><td colspan="7" class="empty-state" style="padding:2rem;text-align:center"><p>No API keys generated yet</p></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
