<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="rf1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/></linearGradient>
    <linearGradient id="rf2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#f093fb"/><stop offset="100%" style="stop-color:#f5576c"/></linearGradient>
    <linearGradient id="rf3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#4facfe"/><stop offset="100%" style="stop-color:#00f2fe"/></linearGradient>
    <linearGradient id="rf4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#43e97b"/><stop offset="100%" style="stop-color:#38f9d7"/></linearGradient>
    <filter id="rs" x="-3%" y="-3%" width="106%" height="106%"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="rg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#43e97b"/></marker>
    <marker id="rr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f5576c"/></marker>
  </defs>
  <rect width="800" height="500" fill="#f8f9fa" rx="10"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3436">Request Processing Flow</text>
  <rect x="30" y="50" width="120" height="40" rx="20" fill="url(#rf1)" filter="url(#rs)"/>
  <text x="90" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Client</text>
  <line x1="150" y1="70" x2="190" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="195" y="50" width="100" height="40" rx="6" fill="#e74c3c" filter="url(#rs)"/>
  <text x="245" y="68" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Threat Block</text>
  <text x="245" y="82" text-anchor="middle" font-size="8" fill="white">IP/Key Check</text>
  <line x1="295" y1="70" x2="330" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="335" y="50" width="100" height="40" rx="6" fill="#e67e22" filter="url(#rs)"/>
  <text x="385" y="68" text-anchor="middle" font-size="9" fill="white" font-weight="bold">WAF</text>
  <text x="385" y="82" text-anchor="middle" font-size="8" fill="white">SQLi/XSS/LFI</text>
  <line x1="435" y1="70" x2="470" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="475" y="50" width="100" height="40" rx="6" fill="#f39c12" filter="url(#rs)"/>
  <text x="525" y="68" text-anchor="middle" font-size="9" fill="white" font-weight="bold">URL Masking</text>
  <text x="525" y="82" text-anchor="middle" font-size="8" fill="white">Path Rewrite</text>
  <line x1="575" y1="70" x2="610" y2="70" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="615" y="50" width="100" height="40" rx="6" fill="#9b59b6" filter="url(#rs)"/>
  <text x="665" y="68" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Auth</text>
  <text x="665" y="82" text-anchor="middle" font-size="8" fill="white">Key/JWT/OAuth</text>
  <line x1="665" y1="90" x2="665" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="615" y="135" width="100" height="40" rx="6" fill="#2980b9" filter="url(#rs)"/>
  <text x="665" y="153" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Rate Limit</text>
  <text x="665" y="167" text-anchor="middle" font-size="8" fill="white">Tier-based</text>
  <line x1="615" y1="155" x2="575" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="475" y="135" width="100" height="40" rx="6" fill="#1abc9c" filter="url(#rs)"/>
  <text x="525" y="153" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Cache Check</text>
  <text x="525" y="167" text-anchor="middle" font-size="8" fill="white">TTL-based</text>
  <line x1="475" y1="155" x2="435" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="335" y="135" width="100" height="40" rx="6" fill="#16a085" filter="url(#rs)"/>
  <text x="385" y="153" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Circuit Breaker</text>
  <text x="385" y="167" text-anchor="middle" font-size="8" fill="white">State Machine</text>
  <line x1="335" y1="155" x2="295" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="195" y="135" width="100" height="40" rx="6" fill="#27ae60" filter="url(#rs)"/>
  <text x="245" y="153" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Load Balancer</text>
  <text x="245" y="167" text-anchor="middle" font-size="8" fill="white">RR + Canary</text>
  <line x1="245" y1="175" x2="245" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="195" y="220" width="100" height="40" rx="6" fill="#8e44ad" filter="url(#rs)"/>
  <text x="245" y="238" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Transform</text>
  <text x="245" y="252" text-anchor="middle" font-size="8" fill="white">Headers/Body</text>
  <line x1="295" y1="240" x2="330" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="335" y="220" width="100" height="40" rx="6" fill="#2c3e50" filter="url(#rs)"/>
  <text x="385" y="238" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Payload Encrypt</text>
  <text x="385" y="252" text-anchor="middle" font-size="8" fill="white">AES-256-GCM</text>
  <line x1="435" y1="240" x2="470" y2="240" stroke="#43e97b" stroke-width="2" marker-end="url(#rg)"/>
  <rect x="475" y="220" width="120" height="40" rx="20" fill="url(#rf3)" filter="url(#rs)"/>
  <text x="535" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Backend</text>
  <line x1="535" y1="260" x2="535" y2="300" stroke="#43e97b" stroke-width="1.5" marker-end="url(#rg)"/>
  <text x="555" y="285" font-size="8" fill="#43e97b">Response</text>
  <rect x="475" y="305" width="120" height="35" rx="6" fill="#3498db" filter="url(#rs)"/>
  <text x="535" y="327" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Analytics Record</text>
  <line x1="475" y1="322" x2="435" y2="322" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="335" y="305" width="100" height="35" rx="6" fill="#e74c3c" filter="url(#rs)"/>
  <text x="385" y="327" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Anomaly Check</text>
  <line x1="335" y1="322" x2="295" y2="322" stroke="#555" stroke-width="1.5" marker-end="url(#ra)"/>
  <rect x="195" y="305" width="100" height="35" rx="6" fill="#95a5a6" filter="url(#rs)"/>
  <text x="245" y="327" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Access Log</text>
  <line x1="195" y1="322" x2="135" y2="322" stroke="#43e97b" stroke-width="2" marker-end="url(#rg)"/>
  <rect x="30" y="305" width="105" height="35" rx="17" fill="url(#rf4)" filter="url(#rs)"/>
  <text x="82" y="327" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Response</text>
  <rect x="30" y="380" width="740" height="100" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d3436">Filter Execution Order</text>
  <text x="50" y="425" font-size="10" fill="#555">1. ThreatBlock (HIGHEST+1)</text>
  <text x="50" y="445" font-size="10" fill="#555">2. UrlMasking (HIGHEST+2)</text>
  <text x="50" y="465" font-size="10" fill="#555">3. WAF (HIGHEST+3)</text>
  <text x="250" y="425" font-size="10" fill="#555">4. Auth (HIGHEST+10)</text>
  <text x="250" y="445" font-size="10" fill="#555">5. RateLimit (HIGHEST+20)</text>
  <text x="250" y="465" font-size="10" fill="#555">6. Cache (HIGHEST+25)</text>
  <text x="450" y="425" font-size="10" fill="#555">7. CircuitBreaker (0)</text>
  <text x="450" y="445" font-size="10" fill="#555">8. LoadBalancer (0)</text>
  <text x="450" y="465" font-size="10" fill="#555">9. Transform (0)</text>
  <text x="640" y="425" font-size="10" fill="#555">10. Encrypt (1)</text>
  <text x="640" y="445" font-size="10" fill="#555">11. Analytics (LOWEST)</text>
  <text x="640" y="465" font-size="10" fill="#555">12. Anomaly (LOWEST)</text>
