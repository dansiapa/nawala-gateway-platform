<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugins - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar('plugins')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Plugins', 'Custom request/response processing hooks')}"></div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card"><div class="card-header"><h3>Create Plugin</h3></div><div class="card-body">
                <form method="post" action="/plugins" class="form-grid">
                    <div class="form-group"><label>Name</label><input type="text" name="name" required class="form-control" placeholder="My Plugin"></div>
                    <div class="form-group"><label>Hook Type</label><select name="hookType" class="form-control"><option value="PRE_REQUEST">Pre-Request</option><option value="POST_RESPONSE">Post-Response</option><option value="ERROR_HANDLER">Error Handler</option><option value="SCHEDULER">Scheduler</option></select></div>
                    <div class="form-group"><label>Route ID (optional, blank=global)</label><input type="number" name="routeId" class="form-control"></div>
                    <div class="form-group"><label>Priority</label><input type="number" name="priority" value="100" class="form-control"></div>
                    <div class="form-group" style="grid-column:1/-1"><label>Description</label><input type="text" name="description" class="form-control" placeholder="What this plugin does"></div>
                    <div class="form-group" style="grid-column:1/-1"><label>Script (JavaScript)</label><textarea name="script" class="form-control" rows="6" placeholder="// context.request, context.response available"></textarea></div>
                    <div class="form-actions"><button type="submit" class="btn btn-primary">Create Plugin</button></div>
                </form>
            </div></div>
            <div class="card" style="margin-top:1.5rem"><div class="card-header"><h3>Your Plugins</h3></div><div class="card-body">
                <table class="data-table" th:if="${!plugins.isEmpty()}"><thead><tr><th>Name</th><th>Hook</th><th>Route</th><th>Executions</th><th>Errors</th><th>Active</th><th>Actions</th></tr></thead><tbody>
                    <tr th:each="p : ${plugins}">
                        <td th:text="${p.name}">name</td>
                        <td><span class="badge badge-blue" th:text="${p.hookType}">PRE_REQUEST</span></td>
                        <td th:text="${p.routeId != null} ? ${p.routeId} : 'Global'">Global</td>
                        <td th:text="${p.executionCount}">0</td>
                        <td th:text="${p.errorCount}">0</td>
                        <td><span class="badge" th:classappend="${p.active} ? ' badge-green' : ' badge-grey'" th:text="${p.active} ? 'Active' : 'Off'">active</span></td>
                        <td>
                            <form method="post" th:action="@{/plugins/{id}/toggle(id=${p.id})}" style="display:inline"><input type="hidden" name="active" th:value="${!p.active}"><button class="btn btn-sm btn-secondary" th:text="${p.active} ? 'Disable' : 'Enable'">Toggle</button></form>
                            <form method="post" th:action="@{/plugins/{id}/delete(id=${p.id})}" style="display:inline"><button class="btn btn-sm btn-danger">Delete</button></form>
                        </td>
                    </tr>
                </tbody></table>
                <div class="empty-state" th:if="${plugins.isEmpty()}"><p>No plugins. Create one to extend gateway behavior.</p></div>
            </div></div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
