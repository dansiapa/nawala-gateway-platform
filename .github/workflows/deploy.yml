name: Deploy Nawala to Production

on:
  push:
    branches:
      - deploy/production
  workflow_dispatch:

env:
  APP_NAME: nawala
  DEPLOY_PATH: /opt/nawala
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: platform-war
          path: platform/target/*.war
          retention-days: 1

      - name: Upload gateway artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-war
          path: gateway/target/*.war
          retention-days: 1

  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download platform artifact
        uses: actions/download-artifact@v4
        with:
          name: platform-war
          path: ./artifacts/platform

      - name: Download gateway artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-war
          path: ./artifacts/gateway

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy artifacts to server
        run: |
          scp -i ~/.ssh/deploy_key \
            ./artifacts/platform/*.war \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/platform.war

          scp -i ~/.ssh/deploy_key \
            ./artifacts/gateway/*.war \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/gateway.war

      - name: Copy deployment scripts
        run: |
          scp -i ~/.ssh/deploy_key \
            ./scripts/server-setup.sh \
            ./scripts/start.sh \
            ./scripts/stop.sh \
            ./scripts/restart.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Execute deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          
          cd /opt/nawala
          chmod +x *.sh

          # Stop existing services
          ./stop.sh || true

          # Run server setup (idempotent)
          sudo ./server-setup.sh

          # Start services
          ./start.sh

          echo "=== Deployment complete ==="
          echo "Platform: http://$(hostname -I | awk '{print $1}'):8080"
          echo "Gateway:  http://$(hostname -I | awk '{print $1}'):9090"
          EOF

      - name: Health check
        run: |
          sleep 30
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          
          echo "--- Platform Health ---"
          curl -sf http://localhost:8080/login && echo " [OK]" || echo " [FAIL]"
          
          echo "--- Gateway Health ---"
          curl -sf http://localhost:9090/actuator/health && echo " [OK]" || echo " [FAIL]"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
