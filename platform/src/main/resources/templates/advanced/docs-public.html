<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public API Docs - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <main class="main-content" style="margin-left:0;width:100%">
        <header class="top-bar">
            <div class="page-title"><h1>Public API Documentation</h1><p>Browse available APIs</p></div>
        </header>
        <div class="content-area">
            <div class="card"><div class="card-body">
                <div th:if="${!docs.isEmpty()}">
                    <div th:each="d : ${docs}" style="padding:1rem;border-bottom:1px solid var(--border-light)">
                        <h4><a th:href="@{/docs/{id}/view(id=${d.id})}" th:text="${d.title}">Title</a></h4>
                        <span class="badge badge-blue" th:text="''v'' + ${d.version}">v1.0.0</span>
                        <span th:text="${d.description}" style="margin-left:0.5rem;color:var(--text-secondary)">desc</span>
                    </div>
                </div>
                <div class="empty-state" th:if="${docs.isEmpty()}"><p>No public API documentation available.</p></div>
            </div></div>
        </div>
        <footer class="app-footer"><div class="footer-content"><span class="footer-brand">Nawala API Gateway Platform</span><span class="footer-separator">|</span><span class="footer-version">v1.0.0</span><span class="footer-separator">|</span><span class="footer-copy">&copy; 2026 Nawala. All rights reserved.</span></div></footer>
    </main>
</body>
</html>
