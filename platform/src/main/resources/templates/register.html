<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Nawala</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-left">
            <div class="brand-section">
                <div class="brand-logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#grad1)"/><path d="M12 16h24M12 24h18M12 32h22" stroke="white" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs></svg>
                </div>
                <h1 class="brand-title">Nawala</h1>
                <p class="brand-subtitle">Start managing your APIs with enterprise-grade security and monitoring.</p>
                <div class="brand-features">
                    <div class="feature-item"><span class="feature-icon">&#10003;</span><span>Free to get started</span></div>
                    <div class="feature-item"><span class="feature-icon">&#10003;</span><span>Register unlimited routes</span></div>
                    <div class="feature-item"><span class="feature-icon">&#10003;</span><span>Built-in rate limiting</span></div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>Create your account</h2>
                    <p>Fill in the details below to get started</p>
                </div>
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                    <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
                </div>
                <form th:action="@{/register}" th:object="${form}" method="post" class="auth-form">
                    <div class="input-group">
                        <label for="fullName">Full Name</label>
                        <div class="input-wrapper" th:classappend="${#fields.hasErrors(''fullName'')} ? ''has-error'' : ''''">
                            <input type="text" id="fullName" th:field="*{fullName}" placeholder="John Doe" required>
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors(''fullName'')}" th:errors="*{fullName}"></span>
                    </div>
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper" th:classappend="${#fields.hasErrors(''username'')} ? ''has-error'' : ''''">
                            <input type="text" id="username" th:field="*{username}" placeholder="johndoe" required>
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors(''username'')}" th:errors="*{username}"></span>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper" th:classappend="${#fields.hasErrors(''email'')} ? ''has-error'' : ''''">
                            <input type="email" id="email" th:field="*{email}" placeholder="john@example.com" required>
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors(''email'')}" th:errors="*{email}"></span>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper" th:classappend="${#fields.hasErrors(''password'')} ? ''has-error'' : ''''">
                                <input type="password" id="password" th:field="*{password}" placeholder="Min 8 chars" required>
                            </div>
                            <span class="field-error" th:if="${#fields.hasErrors(''password'')}" th:errors="*{password}"></span>
                        </div>
                        <div class="input-group">
                            <label for="confirmPassword">Confirm</label>
                            <div class="input-wrapper" th:classappend="${#fields.hasErrors(''confirmPassword'')} ? ''has-error'' : ''''">
                                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Repeat" required>
                            </div>
                            <span class="field-error" th:if="${#fields.hasErrors(''confirmPassword'')}" th:errors="*{confirmPassword}"></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full"><span>Create Account</span></button>
                </form>
                <div class="auth-footer"><p>Already have an account? <a th:href="@{/login}">Sign in</a></p></div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
