# Test Configuration - overrides main application.properties
spring.application.name=nawala-platform-test
server.port=0

# H2 Database for testing (MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:nawala_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Thymeleaf
spring.thymeleaf.cache=false

# Session
server.servlet.session.timeout=5m

# Encryption key
nawala.encryption.key=ieUfr//mm5I3ZRW39jagiPW9KG8SOiPgvQZULD00LW4=

# Internal API secret
nawala.internal.secret=TestInternalSecret123

# Redis - disabled for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Logging
logging.level.root=WARN
logging.level.id.nawala=INFO

# Disable schema.sql execution in tests (MySQL-specific)
spring.sql.init.mode=never
