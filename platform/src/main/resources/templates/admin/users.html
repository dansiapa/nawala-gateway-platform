<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Nawala Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-brand"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" fill="url(#grad1)"/><path d="M12 16h24M12 24h18M12 32h22" stroke="white" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs></svg><span>Nawala</span></div></div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><span>Dashboard</span></a>
            <a href="/admin" class="nav-item"><span>Admin Panel</span></a>
            <a href="/admin/users" class="nav-item active"><span>Users</span></a>
            <a href="/admin/tiers" class="nav-item"><span>Rate Tiers</span></a>
            <a href="/admin/audit" class="nav-item"><span>Audit Log</span></a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="top-bar"><div class="page-title"><h1>User Management</h1><p>Manage all platform users</p></div></header>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div class="card"><div class="card-body" style="padding:0">
                <table class="data-table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}">user</td>
                        <td th:text="${u.email}">email</td>
                        <td><span class="badge" th:classappend="${u.role.name() == ''ADMIN''} ? '' badge-purple'' : '' badge-blue''" th:text="${u.role}">USER</span></td>
                        <td><span class="badge" th:classappend="${u.enabled} ? '' badge-green'' : '' badge-red''" th:text="${u.enabled} ? ''Active'' : ''Disabled''">Active</span></td>
                        <td th:text="${#temporals.format(u.createdAt, ''yyyy-MM-dd'')}">date</td>
                        <td th:text="${u.lastLoginAt != null ? #temporals.format(u.lastLoginAt, ''MM-dd HH:mm'') : ''Never''}">Never</td>
                        <td><form method="post" th:action="@{/admin/users/{id}/toggle(id=${u.id})}" style="display:inline"><button class="btn btn-sm btn-secondary" th:text="${u.enabled} ? ''Disable'' : ''Enable''">Toggle</button></form></td>
                    </tr>
                </tbody></table>
            </div></div>
        </div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
