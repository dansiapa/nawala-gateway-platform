<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Nawala</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Dashboard', 'Overview of your API Gateway')}"></div>
        <div class="content-area">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon stat-icon-blue"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>
                    <div class="stat-content"><span class="stat-value" th:text="${vm.totalRoutes}">0</span><span class="stat-label">Total Routes</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon stat-icon-green"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                    <div class="stat-content"><span class="stat-value" th:text="${vm.activeRoutes}">0</span><span class="stat-label">Active Routes</span></div>
                </div>
                <div class="stat-card" th:classappend="${vm.unresolvedThreats > 0} ? ' stat-card-warning' : ''">
                    <div class="stat-icon stat-icon-orange"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="stat-content"><span class="stat-value" th:text="${vm.unresolvedThreats}">0</span><span class="stat-label">Threats Detected</span></div>
                </div>
                <div class="stat-card" th:classappend="${vm.blockedSources > 0} ? ' stat-card-danger' : ''">
                    <div class="stat-icon stat-icon-red"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
                    <div class="stat-content"><span class="stat-value" th:text="${vm.blockedSources}">0</span><span class="stat-label">Blocked Sources</span></div>
                </div>
            </div>
            <div class="content-grid">
                <div class="card activity-card">
                    <div class="card-header"><h3>Recent Activity</h3></div>
                    <div class="card-body">
                        <div class="activity-list" th:if="${vm.recentActivities != null and !vm.recentActivities.isEmpty()}">
                            <div class="activity-item" th:each="activity : ${vm.recentActivities}">
                                <div class="activity-dot"></div>
                                <div class="activity-content">
                                    <p class="activity-action" th:text="${activity.description}">Action</p>
                                    <span class="activity-time" th:text="${activity.createdAt != null ? #temporals.format(activity.createdAt, 'dd MMM yyyy HH:mm') : ''}">Time</span>
                                </div>
                            </div>
                        </div>
                        <div class="empty-state" th:if="${vm.recentActivities == null or vm.recentActivities.isEmpty()}"><p>No recent activities</p></div>
                    </div>
                </div>
                <div class="card info-card">
                    <div class="card-header"><h3>Account Info</h3></div>
                    <div class="card-body">
                        <div class="info-list">
                            <div class="info-item"><span class="info-label">Username</span><span class="info-value" th:text="${vm.username}">user</span></div>
                            <div class="info-item"><span class="info-label">Email</span><span class="info-value" th:text="${vm.email}">user@nawala.id</span></div>
                            <div class="info-item"><span class="info-label">Role</span><span class="info-value badge" th:text="${vm.role}" th:classappend="${vm.role == 'ADMIN'} ? ' badge-purple' : ' badge-blue'">USER</span></div>
                            <div class="info-item"><span class="info-label">Last Login</span><span class="info-value" th:text="${vm.lastLogin != null ? #temporals.format(vm.lastLogin, 'dd MMM yyyy HH:mm') : 'First session'}">Never</span></div>
                        </div>
                        <a href="/profile" class="btn btn-outline btn-full" style="margin-top:1.5rem">Edit Profile</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
    </main>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
